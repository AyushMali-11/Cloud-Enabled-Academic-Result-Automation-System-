{% extends "base.html" %}
{% block title %}Login - Academic Result System{% endblock %}

{% block content %}
<div class="login-wrapper min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card login-card shadow-lg border-0">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <i class="bi bi-mortarboard-fill text-primary display-4"></i>
                <h2 class="mt-2">Academic Results</h2>
                <p class="text-muted">Cloud-Enabled Result Automation System</p>
            </div>

            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control form-control-lg" id="username"
                           name="username" placeholder="Enter username" required autofocus>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control form-control-lg" id="password"
                           name="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Login
                </button>
            </form>

            <hr class="my-4">
            <p class="small text-muted text-center mb-1">Demo accounts (password: <code>password123</code>)</p>
            <div class="d-flex flex-wrap gap-2 justify-content-center">
                <span class="badge bg-danger">admin</span>
                <span class="badge bg-success">teacher1</span>
                <span class="badge bg-info text-dark">student1</span>
            </div>
        </div>
    </div>
</div>
{% endblock %}
